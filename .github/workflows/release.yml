name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  metadata:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.metadata.outputs.tag_name }}
      release_name: ${{ steps.metadata.outputs.release_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Derive tag and release names
        id: metadata
        shell: bash
        run: |
          version=$(awk -F' = ' '/^version = / { gsub(/"/, "", $2); print $2; exit }' Cargo.toml)
          tag_name="v${version}-build.${GITHUB_RUN_NUMBER}"
          release_name="ReqBib ${version} build ${GITHUB_RUN_NUMBER}"

          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${release_name}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.target }}
    needs: metadata
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive_name: reqbib-x86_64-unknown-linux-gnu.tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive_name: reqbib-x86_64-apple-darwin.tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            archive_name: reqbib-aarch64-apple-darwin.tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package release archive
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/reqbib dist/reqbib
          tar -C dist -czf "dist/${{ matrix.archive_name }}" reqbib
          shasum -a 256 "dist/${{ matrix.archive_name }}" > "dist/${{ matrix.archive_name }}.sha256"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-release
          path: |
            dist/${{ matrix.archive_name }}
            dist/${{ matrix.archive_name }}.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - metadata
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag_name }}
          name: ${{ needs.metadata.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          files: dist/*
          generate_release_notes: true
          make_latest: true
