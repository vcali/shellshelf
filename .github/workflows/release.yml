name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  metadata:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      tag_name: ${{ steps.metadata.outputs.tag_name }}
      release_name: ${{ steps.metadata.outputs.release_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Derive tag and release names
        id: metadata
        shell: bash
        run: |
          cargo_version=$(awk -F' = ' '/^version = / { gsub(/"/, "", $2); print $2; exit }' Cargo.toml)
          tag_name="${GITHUB_REF_NAME:-}"

          if [ -z "$tag_name" ]; then
            echo "GITHUB_REF_NAME is required for release metadata" >&2
            exit 1
          fi

          case "$tag_name" in
            v*)
              version="${tag_name#v}"
              ;;
            *)
              echo "release tags must use the v<version> format" >&2
              exit 1
              ;;
          esac

          if [ "$version" != "$cargo_version" ]; then
            echo "tag version $version does not match Cargo.toml version $cargo_version" >&2
            exit 1
          fi

          release_name="shellshelf ${version}"

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${release_name}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.target }}
    needs: metadata
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive_name: shellshelf-x86_64-unknown-linux-gnu.tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive_name: shellshelf-x86_64-apple-darwin.tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            archive_name: shellshelf-aarch64-apple-darwin.tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package release archive
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/shellshelf dist/shellshelf
          tar -C dist -czf "dist/${{ matrix.archive_name }}" shellshelf
          shasum -a 256 "dist/${{ matrix.archive_name }}" > "dist/${{ matrix.archive_name }}.sha256"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-release
          path: |
            dist/${{ matrix.archive_name }}
            dist/${{ matrix.archive_name }}.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - metadata
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate Homebrew formula
        shell: bash
        run: |
          bash scripts/generate-homebrew-formula.sh \
            --repo "${{ github.repository }}" \
            --version "${{ needs.metadata.outputs.version }}" \
            --tag "${{ needs.metadata.outputs.tag_name }}" \
            --dist-dir dist \
            --output dist/shellshelf.rb

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag_name }}
          name: ${{ needs.metadata.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          files: dist/*
          generate_release_notes: true
          make_latest: true

      - name: Publish Homebrew tap
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        shell: bash
        env:
          HOMEBREW_TAP_REPO: vcali/homebrew-tap
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          bash scripts/publish-homebrew-tap.sh \
            --tap-repo "${HOMEBREW_TAP_REPO}" \
            --token "${HOMEBREW_TAP_TOKEN}" \
            --formula dist/shellshelf.rb \
            --version "${{ needs.metadata.outputs.version }}"
